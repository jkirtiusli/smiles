on:
  release:
    types: [created]

jobs:
  releases-matrix:
    name: Release Go Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm64]
        binary: [smiles, smiles-mcp]
        include:
          - binary: smiles
            build_dir: ./cmd/cli
          - binary: smiles-mcp
            build_dir: ./cmd/mcp
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: arm64
            goos: windows
    steps:
    - uses: actions/checkout@v4
    - uses: wangyoucao577/go-release-action@v1.28
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: "1.22"
        binary_name: ${{ matrix.binary }}
        project_path: ${{ matrix.build_dir }}
        extra_files: LICENSE README.md
        asset_name: ${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
